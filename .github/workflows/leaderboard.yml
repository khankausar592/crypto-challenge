# Updates leaderboard on merge
name: 📊 Update Leaderboard

on:
  pull_request_target:
    types: [closed]
  
  workflow_dispatch:

jobs:
  update:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read  # ← ADD THIS to download artifacts
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 📥 Download score from PR
        uses: actions/download-artifact@v4
        with:
          name: score-data
          path: .score-data/
        continue-on-error: true
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 📊 Update leaderboard
        run: |
          python scripts/update_leaderboard.py
      
      - name: 📁 Save submission history
        run: |
          mkdir -p submissions
          if [ -f ".score-data/submission_*.csv" ]; then
            cp .score-data/submission_*.csv submissions/
          fi
      
      - name: 📤 Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 Update leaderboard automatically"
          file_pattern: "leaderboard.csv submissions/*.csv"
          commit_user_name: "Leaderboard Bot"
          commit_user_email: "bot@github.com"
