name: Update Leaderboard

on:
  pull_request_target:
    types: [closed]
    
  workflow_run:
    workflows: ["Judge Submission"]
    types: [completed]

jobs:
  update:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download score artifact
        uses: actions/download-artifact@v4
        with:
          pattern: score-data-*
          path: .scores/
          merge-multiple: true
      
      - name: Update leaderboard
        run: |
          import json
          import csv
          import glob
          import os
          
          # Find all score files
          scores = []
          for score_file in glob.glob('.scores/score_result.json'):
              with open(score_file, 'r') as f:
                data = json.load(f)
                scores.append(data)
          
          if not scores:
              print("No scores found")
              exit(0)
          
          # Read existing leaderboard
          leaderboard = []
          if os.path.exists('leaderboard.csv'):
              with open('leaderboard.csv', 'r') as f:
                  reader = csv.reader(f)
                  leaderboard = list(reader)
          
          # Add new scores
          for score in scores:
              username = score['username']
              existing = False
              for row in leaderboard[1:]:
                  if len(row) > 1 and row[1] == username:
                      existing = True
                      break
              
              if not existing:
                  leaderboard.append([
                      str(len(leaderboard)),
                      username,
                      f"${score['prediction']:,.2f}",
                      f"${score['actual_price']:,.2f}",
                      f"{score['accuracy']}%",
                      score['date']
                  ])
          
          # Update ranks
          for i, row in enumerate(leaderboard[1:], 1):
              row[0] = str(i)
          
          # Write back
          with open('leaderboard.csv', 'w', newline='') as f:
              writer = csv.writer(f)
              writer.writerows(leaderboard)
          
          print(f"✅ Updated leaderboard with {len(scores)} new scores")
        shell: python
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update leaderboard from PR #${{ github.event.pull_request.number }}"
          file_pattern: "leaderboard.csv"
