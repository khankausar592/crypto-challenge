name: Judge Submission

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - run: pip install requests pandas
      
      - name: Calculate score
        run: |
          python scripts/calculate_score.py
      
      - name: Save score artifact
        uses: actions/upload-artifact@v4
        with:
          name: score-data-${{ github.event.pull_request.number }}
          path: |
            score_result.json
            score_result.csv
          retention-days: 30
      
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('score_result.json', 'utf8'));
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🎯 Prediction Results\n\nYour Score: **${data.accuracy}%** accurate!\n\nPrediction: $${data.prediction}\nActual: $${data.actual_price}\n\nGreat prediction!`
            });
