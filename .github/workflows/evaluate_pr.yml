name: Evaluate Submission

on:
  pull_request_target:
    paths:
      - 'submissions/**'

jobs:
  evaluate:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas

      - name: Download submission file
        run: |
          curl -L \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/${{ github.event.pull_request.head.repo.full_name }}/contents/submissions/${{ github.event.pull_request.user.login }}.csv?ref=${{ github.event.pull_request.head.sha }}" \
            -o submission.csv

      - name: Run evaluation
        run: |
          python evaluate.py \
            --submission submission.csv \
            --username ${{ github.event.pull_request.user.login }} \
            --output result.json

      - name: Post result comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('./result.json'));

            let body = result.valid
              ? `✅ Accuracy: ${(result.score * 100).toFixed(2)}%`
              : `❌ Submission invalid\n\nReason:\n${result.error}`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
