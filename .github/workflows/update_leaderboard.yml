name: Update Leaderboard

on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas

      - name: Find latest submission
        run: |
          FILE=$(ls submissions/*.csv | tail -n 1)
          echo "FILE=$FILE" >> $GITHUB_ENV

      - name: Run evaluation
        run: |
          python evaluate.py \
            --submission $FILE \
            --username $(basename $FILE .csv | xargs basename) \
            --output result.json

      - name: Update leaderboard
        run: python update_leaderboard.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json README.md
          git commit -m "Update leaderboard" || echo "No changes"
          git push
