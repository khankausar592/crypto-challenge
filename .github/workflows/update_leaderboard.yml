name: Update Leaderboard

on:
  pull_request:
    types: [closed]

jobs:
  update:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas

      - name: Re-run evaluation
        run: |
          python evaluate.py \
            --submission submissions/${{ github.event.pull_request.user.login }}.csv \
            --username ${{ github.event.pull_request.user.login }} \
            --output result.json

      - name: Update leaderboard
        run: python update_leaderboard.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json README.md
          git commit -m "Update leaderboard after PR #${{ github.event.pull_request.number }}"
          git push
